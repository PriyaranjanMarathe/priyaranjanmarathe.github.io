<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

{%- include head.html -%}

<head>
    <meta name="google-site-verification" content="my5juJd8928Rn3SNECWUmHRUVNPLZICnRb4L6yrvg2Y" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
</head>

<body>
    <main class="page-content" aria-label="Content">

        <!-- Wrapper for Blog Title -->
        <div class="container-fluid bg-white fixed-top shadow">
            <div class="container text-center py-3">
                <a href="{{ site.baseurl }}/" style="text-decoration: none; color: inherit;">
                    <h2 class="fw-bold">Ranjan Marathe Blog</h2>
                </a>
            </div>
        </div>

        <!-- Space Below the Blog Title -->
        <div style="height: 80px;"></div>

        <!-- Navbar Container -->
        <div class="container">
            <ul class="nav nav-tabs justify-content-center bg-white shadow-sm"
                style="position: fixed; top: 80px; width: 100%; z-index: 999;">
                <li class="nav-item">
                    <a class="nav-link {% if page.url == '/' %}active{% endif %}" href="{{ site.baseurl }}/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page.url == '/about' %}active{% endif %}"
                        href="{{ site.baseurl }}/about">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page.url == '/bot' %}active{% endif %}"
                        href="{{ site.baseurl }}/bot">BOT</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page.url == '/mb' %}active{% endif %}"
                        href="{{ site.baseurl }}/mb">Microblog</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page.url == '/til' %}active{% endif %}"
                        href="{{ site.baseurl }}/til">TILS</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page.url == '/search/' %}active{% endif %}"
                        href="{{ site.baseurl }}/search/">Search</a>
                </li>
            </ul>
        </div>

        <!-- Space Below Navbar -->
        <div style="height: 50px;"></div>

        <!-- Main Content -->
        <div class="container mt-5">
            {{ content }}
        </div>

    </main>
</body>

</html>
