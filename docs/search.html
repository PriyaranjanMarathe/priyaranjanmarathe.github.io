<h1>Search</h1>
<input type="text" id="search-box" placeholder="Type to search..." autofocus>
<ul id="search-results"></ul>

<!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script> -->
<script src="{{ site.baseurl }}/assets/js/lunr.min.js"></script>

<script>
  let idx;
  let documents = [];

  async function loadSearchIndex() {
    let response = await fetch("/search.json");
    documents = await response.json();

    idx = lunr(function () {
      this.ref("id");
      this.field("title");
      this.field("content");

      documents.forEach(doc => this.add(doc));
    });
  }

  function searchSite() {
    let query = document.getElementById("search-box").value.trim().toLowerCase();
    let resultsList = document.getElementById("search-results");

    if (!query) {
      resultsList.innerHTML = "";
      return;
    }

    let results = idx.search(query);
    resultsList.innerHTML = results.length
      ? results.map(r => {
          let doc = documents.find(d => d.id == r.ref);
          return `<li><a href="${doc.url}">${doc.title}</a></li>`;
        }).join("")
      : "<li>No results found</li>";
  }

  document.getElementById("search-box").addEventListener("input", searchSite);
  loadSearchIndex();
</script>
